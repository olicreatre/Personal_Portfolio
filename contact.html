    <header class="page-header">
        <h1>Contact</h1>
    </header>

    <main class="contact-layout">

        <section class="contact-box">

            <h2>Contact Me</h2>

            <form action="" method="post" class="contact-form" onsubmit="alert('Thank you! Will hear back soon')">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your email address" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" placeholder="Subject" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here..."
                    required></textarea>

                <button type="submit">Send Message</button>
            </form>

        </section>

        <section class="contact-side">
            <h3>Let's connect</h3>
            <p>
                Feel free to reach out for questions or just to say hello.
            </p>

        </section>

    </main>

    <script>
        document.getElementById("message").addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = this.scrollHeight + "px";
        });
    </script>
